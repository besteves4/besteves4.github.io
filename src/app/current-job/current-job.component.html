<h2>
    {{job.position}}
</h2>

<div class="list-group list-group-flush">
    <div class="list-group-item item" *ngFor="let item of job.employer">
        <a href="{{item.href}}" target="_blank">
            <div class="float-right img-wrapper">
                <img src="{{item.imageSrc}}" alt="">
            </div>
            <span>
                {{item.title}}
            </span>
        </a>
    </div>
</div>
