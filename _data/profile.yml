short_bio_text_justify: false
short_bio: >-
  <p class='question'>
    <strong>Can we make law and technology speak the same language?</strong>
  </p>
  <p>
    As a Postdoctoral Researcher, my research seeks to <strong>bridge the longstanding gap between law and technology</strong>, transforming legal requirements into interoperable standards, machine-readable knowledge, and practical tools that enable responsible innovation.
  </p>
  <p>
    This vision extends beyond academia. I actively contribute to the <strong>standardisation of Web technologies</strong> as <i>Co-Chair</i> of the W3C Data Privacy Vocabularies and Controls Community Group (<a href="https://www.w3.org/community/dpvcg/" target="_blank">W3C DPVCG</a>), and as <i>Editor</i> of the W3C Open Digital Rights Language (<a href="https://www.w3.org/community/odrl/" target="_blank">W3C ODRL CG</a>).
    I am also proud to be a member of the <a href="https://www.edpb.europa.eu/support-pool-of-experts-spe-programme_en" target="_blank">EDPB's Support Pool of Experts</a>.
  </p>
  <p>
    Whether through research, standardisation, or collaboration with European institutions, my goal is the same: to help build a Web where trust is an integral part of the infrastructure, one where <strong>people, organisations, and intelligent systems can exchange insights</strong> transparently and in ways that support both fundamental rights and economic incentives.
  </p>

