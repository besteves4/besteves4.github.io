<div class="page-container">
    <div class="page">
        <div class="row">
            <div class="col-12">
                <img src="{{publication.Companies.Main}}" alt="" width="100" class="float-left">
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <h2 class="text-center">
                    {{publication.Title}}
                </h2>        
            </div>
            <div class="col-12">
                <h5 class="text-center">
                    {{publication.Subtitle}}
                </h5>
            </div>
            <div class="col-12">
                <p class="text-center">
                    {{publication.ReleaseDate}}
                </p>
            </div>
        </div>
        <div class="row">
            <div class="col-12 abstract-list">
                <span *ngFor="let abs of publication.Abstract">
                    {{abs}}<br>
                </span>
            </div>
        </div>
        <div class="row mt-3 mb-3 keyword-list">
            <div class="col-12">
                <b class="keyword">Keywords:</b>
                {{publication.Keywords[0]}}<span *ngFor="let key of publication.Keywords | slice : 1">, {{key}}</span>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <b>Authors:</b>
                <ul class="author-list">
                    <li *ngFor="let author of publication.Authors">
                        {{author.FullName}}
                    </li>
                </ul>
            </div>
        </div>
        <div class="row" *ngIf="publication.Advisers.length != 0">
            <div class="col-12">
                <b>Advisers:</b>
                <ul class="author-list">
                    <li *ngFor="let adviser of publication.Advisers">
                        {{adviser}}
                    </li>
                </ul>
            </div>
        </div>
        <div class="row logo-row" *ngIf="publication.Companies.Others">
            <div class="col-12">
                <p>
                    In collaboration with:
                </p>
            </div>
            <div class="col-3" *ngFor="let company of publication.Companies.Others">
                <div class="img-box">
                    <img src="{{company}}" alt="" class="float-center bottom-logo">
                </div>
            </div>
        </div>
    </div>
    <div class="overlay clickable" (click)="handleClick()">
        <a class="icon">
            <fa-icon [icon]="faExternalLinkAlt"></fa-icon>
        </a>
    </div>      
</div>
<a href="{{publication.DocUrl}}" target="_blank" id="hidden-anchor"></a>
