<h2>
    {{job.position}}
</h2>

<div class="list-group list-group-flush">
    <div class="list-group-item item clickable" *ngFor="let item of job.employer" (click)="handleClick(item.id)">
        <!-- <div class="media">
            <div class="media-body">
                {{item.title}}
            </div>
            <img src="{{item.imageSrc}}" class="align-self-center ml-3" alt="...">
          </div> -->
        <div class="float-right img-wrapper">
            <img src="{{item.imageSrc}}" alt="">
        </div>
        <div class="text-wrapper">
            <span class="button-text">
                {{item.title}}
            </span>
        </div>
        <a href="{{item.href}}" target="_blank" [id]="item.id"></a>
    </div>
</div>
