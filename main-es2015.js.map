<div class="row mt-5">
    <div class="col-6">
        <app-publications-list [publications]="publications" (setActive)="handleSetActive($event)"></app-publications-list>
    </div>
    <div class="col-6" *ngIf="activePublication">
        <app-publication-preview [publication]="activePublication"></app-publication-preview>
    </div>
</div>
