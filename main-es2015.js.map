<h2>
    {{contacts.title}}
</h2>

<div class="list-group list-group-flush">
    <div class="list-group-item item clickable" *ngFor="let item of contacts.list" (click)="handleClick(item.id)">
        <div class="icon-box mr-3">
            <fa-icon [icon]="item.icon"></fa-icon>
        </div>
        <span class="button-text">
            {{item.title}}
        </span>
        <a href="{{item.href}}" target="_blank" [id]="item.id"></a>
    </div>
</div>
