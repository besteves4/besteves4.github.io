<ul class="list-group">
    <li class="list-group-item clickable" *ngFor="let publication of publications" (click)="handleClick(publication.Id)" [ngClass]="{'active': publication.Id == activeId}">
        <span class="title">
            {{publication.Title}}
        </span>
        <span *ngIf="!!publication.ReleaseDate">
            - {{publication.ReleaseDate}}
        </span>
        <br>
        <div class="authors">
            <span *ngIf="publication.Authors.length > 1; else elseBlock">
                {{publication.Authors[0].ShortName}}<span *ngFor="let author of publication.Authors | slice : 1">, {{author.ShortName}}</span>
            </span>
            <ng-template #elseBlock>{{publication.Authors.ShortName}}</ng-template>
        </div>
    </li>
</ul>
